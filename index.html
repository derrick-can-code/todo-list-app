<!doctype html>
<html>
  <head>
    <title>My Todo List</title>

    <!-- This code is needed for responsive design to work.
      (Responsive design = make the website look good on
      smaller screen sizes like a phone or a tablet). -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Load a font called Roboto from Google Fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: aqua;
        backdrop-filter: blur(10px);
        /* Include vendor prefix for broader compatibility */
        -webkit-backdrop-filter: blur(10px);
      }
      * {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
      }
      .header {
        color: #fff;
        background-color: rgb(33, 33, 122);
        padding: 6px;
        font-size: 20px;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
        width: 550px;
        font-weight: 600;
      }

      .header p {
        text-align: center;
      }

      .below-header {
        width: 550px;
      }

      .below-header p {
        text-align: center;
        font-weight: 500;
        color: rgb(33, 33, 122);
      }

      .todo-section {
        width: 550px;
      }

      .todo-section-input {
        width: 300px;
        height: 40px;
        margin-right: 3px;
      }

      .todo-section-date {
        height: 42px;
        margin-right: 3px;
        width: 122px;
      }

      .todo-section-add-btn {
        height: 44px;
        width: 100px;
        color: #fff;
        background-color: green;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }

      .main {
        display: block;
        justify-content: center; /* Centers content horizontally */
        min-height: 500px; 
        border: 1px solid black;
        margin-left: auto;
        margin-right: auto;
        width: 550px;
        padding: 50px;
        background-color: white;
      }

      .lists{
        display: flex;
        border: 1px solid black;
        width: 100%;
      }

      .delete-button{
        height: 44px;
        width: 100px;
        color: #fff;
        background-color: red;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-left: 21px;
        margin-bottom: 5px;
      }

      .todo-row{
        display: grid;
        grid-template-columns: 300px 122px 100px;
        column-gap: 3px;
        margin-top: 10px;
        align-items: center;
      }

      .date-section{
        margin-left: 20px;
      }


    </style>
  </head>

  <body>
    <div class="main">
      <div class="header">
        <p>Derrick's Todo List</p>
      </div>

      <div class="below-header">
        <p>
          Make your List. Save some time. Explore better <br />
          Plan Better than before
        </p>
      </div>

      <div class="todo-section">
        <input class="todo-section-input js-input" type="text" />
        <input class="todo-section-date js-dueDate" type="date" />
        <button class="todo-section-add-btn" onclick="addTodo()">Add</button>
      </div>

      <div class="js-todo-List todo-row"></div>


    <script>
      const todoList = [];

      function renderTodoList(){
        let todoListHTML = [];

        for (let i = 0; i<todoList.length; i++){
          const todoObject = todoList[i];

          const inputName = todoObject.name;
          const selectDate = todoObject.date;

          //we could use destructuring if we want the old name to be same as new name assigned

          //const {inputName, selectDate} = todoObject;

          const html = `<div>${inputName}</div>
          <div class = "date-section">${selectDate}</div>
          <button class = "delete-button" 
          onclick = "
          todoList.splice(${i}, 1);
          renderTodoList();
          "
          >Delete</button>
          `;

        todoListHTML = todoListHTML + html;
        }

        document.querySelector(".js-todo-List").innerHTML = todoListHTML;
      }

      function addTodo(){
        const inputElement = document.querySelector('.js-input');
        const inputName = inputElement.value;

       

        const dateElement = document.querySelector('.js-dueDate');
        const selectDate = dateElement.value;

       
        todoList.push({
          name: inputName ,
          date: selectDate
        });

        console.log(todoList);

        inputElement.value = '';

        renderTodoList();
      }

    </script>
  </body>
</html>
